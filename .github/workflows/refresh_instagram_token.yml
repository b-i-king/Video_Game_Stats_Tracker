name: Refresh Instagram Access Token

# NOTE: Automatic refresh is disabled — the current token is a never-expiring
# Meta Business Suite system user token and does not need rotation.
# Schedule trigger removed to prevent accidental overwrites.
#
# This workflow is kept as a reference for future use if per-user OAuth tokens
# are needed (e.g. public users connecting their own Instagram accounts).
#
# Manual token check: https://developers.facebook.com/tools/debug/accesstoken/

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print current token info without refreshing (true/false)'
        required: false
        default: 'false'

jobs:
  refresh-token:
    name: Refresh Instagram Token
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install boto3 requests

      - name: Dry run — print current token info only
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_SECRETS }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_SECRETS }}
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, '.')
          from utils.instagram_token_utils import get_current_secret

          secret = get_current_secret()
          token = secret['access_token']
          has_app_id = bool(secret.get('app_id'))
          has_app_secret = bool(secret.get('app_secret'))
          print(f"Current token suffix: ...{token[-8:]}")
          print(f"app_id present:       {has_app_id}")
          print(f"app_secret present:   {has_app_secret}")
          print("ℹ️  Dry run complete — no changes made.")
          EOF

      - name: Refresh token and update Secrets Manager
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_SECRETS }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_SECRETS }}
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, '.')
          from utils.instagram_token_utils import run_token_refresh
          run_token_refresh()
          EOF
