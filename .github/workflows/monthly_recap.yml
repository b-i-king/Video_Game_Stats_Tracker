name: Monthly Recap Email

on:
  schedule:
    - cron: "11 9 1 * *"  # 9:11 AM UTC on the 1st of every month
  workflow_dispatch:        # manual trigger for testing

jobs:
  send-recap:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monthly recap
        run: |
          curl -X POST \
            -H "X-API-Key: ${{ secrets.RENDER_API_KEY }}" \
            https://video-game-stats-api.onrender.com/api/newsletter/send_monthly
