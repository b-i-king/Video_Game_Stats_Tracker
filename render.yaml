services:
  - type: web
    name: video-game-stats-api
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn api.main:app -w ${WEB_CONCURRENCY:-1} -k uvicorn.workers.UvicornWorker --timeout 120 --bind 0.0.0.0:10000
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    envVarGroups: []
