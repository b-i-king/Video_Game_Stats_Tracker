// ── Auth — obtain a short-lived JWT at load time ──────────────────────────────
let _gameJwt      = null;
let _pendingScore = null; // {score, checkpoints} queued while auth was in-flight
let _authState    = 'idle'; // 'idle' | 'pending' | 'ok' | 'failed'

async function _postScore(score, checkpoints){
  const r = await fetch('/api/game/score',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+_gameJwt},
    body:JSON.stringify({
      game_name:   'Light Climb',
      player_name: PLAYER_NAME,
      score,
      checkpoints,
      platform:     IS_MOBILE ? 'Mobile' : 'PC',
      input_device: IS_MOBILE ? 'Touch'  : 'Keyboard & Mouse',
    }),
    signal:AbortSignal.timeout(5000),
  });
  if(!r.ok){ const t=await r.text(); console.warn('[LC] score submit',r.status,t); }
  else console.log('[LC] score recorded',score+'m',checkpoints,'cp');
}

async function gameAuth(){
  if(!TG_INIT_DATA || _authState==='ok') return;
  _authState = 'pending';
  try{
    const r = await fetch('/api/game/auth',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({init_data:TG_INIT_DATA}),
      signal:AbortSignal.timeout(5000),
    });
    if(r.ok){
      const data = await r.json();
      _gameJwt   = data.token;
      _authState = 'ok';
      if(PLAYER_NAME === 'YOU' && data.display_name){
        PLAYER_NAME     = data.display_name;
        PLAYER_INITIALS = PLAYER_NAME.slice(0,2).toUpperCase();
      }
      if(_pendingScore){
        const {score, checkpoints} = _pendingScore;
        _pendingScore = null;
        try{ await _postScore(score, checkpoints); }catch(e){ console.error('[LC] pending flush',e); }
      }
    } else {
      _authState = 'failed';
      console.warn('[LC] auth failed', r.status, await r.text());
    }
  }catch(e){ _authState='failed'; console.error('[LC] auth error',e); }
}
gameAuth(); // fire-and-forget at load

// ── Audio ─────────────────────────────────────────────────────────────────────
let _ac = null;
function _getAC(){
  if(!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  if(_ac.state === 'suspended') _ac.resume();
  return _ac;
}
function _tone(freq, type, dur, vol, fEnd, t0){
  try{
    const ac=_getAC(), now=ac.currentTime+(t0||0);
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type; o.frequency.setValueAtTime(freq,now);
    if(fEnd!=null) o.frequency.linearRampToValueAtTime(fEnd,now+dur);
    g.gain.setValueAtTime(vol,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+dur);
    o.start(now); o.stop(now+dur);
  }catch{}
}
function _noise(dur, fLow, fHigh, vol, t0){
  try{
    const ac=_getAC(), now=ac.currentTime+(t0||0);
    const len=Math.ceil(ac.sampleRate*dur);
    const buf=ac.createBuffer(1,len,ac.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    const src=ac.createBufferSource(); src.buffer=buf;
    const flt=ac.createBiquadFilter(); flt.type='bandpass';
    flt.frequency.setValueAtTime(fLow,now);
    flt.frequency.linearRampToValueAtTime(fHigh,now+dur);
    flt.Q.setValueAtTime(0.7,now);
    const g=ac.createGain(); g.gain.setValueAtTime(vol,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+dur);
    src.connect(flt); flt.connect(g); g.connect(ac.destination);
    src.start(now); src.stop(now+dur);
  }catch{}
}
const SFX={

  challengeCorrect(){ _tone(523,'sine',0.08,0.20); _tone(659,'sine',0.08,0.20,null,0.09); _tone(784,'sine',0.08,0.20,null,0.18); _tone(1047,'sine',0.20,0.28,null,0.27); },
  challengeWrong(){ _tone(300,'sawtooth',0.22,0.22,110); },

  powerJump(){      _tone(1400,'sine',0.28,0.20,220); _tone(900,'sine',0.18,0.10,180,0.05); }, // rain drop

// ── Dynamic prompt generators ─────────────────────────────────────────────────
const SUP = ['⁰','¹','²','³','⁴','⁵','⁶','⁷','⁸','⁹'];
function sup(n){ return SUP[n] ?? '^'+n; }
function fact(n){ let r=1; for(let i=2;i<=n;i++) r*=i; return r; }
function pickDecoy(correct, ...extras){
  const cands=[...extras, correct+1, correct-1, correct+2, correct-2]
    .filter(d=>d!==correct && d>=0 && Number.isInteger(d));
  return cands.length ? cands[ri(0,cands.length)] : correct+1;
}

// Normal-tier generators (prestige 0)
function genArithmetic(){
  const a=ri(2,12), b=ri(2,12);
  const ops=['+','-','×'], op=ops[ri(0,3)];
  const correct = op==='+'?a+b : op==='-'?a-b : a*b;
  return {q:`${a} ${op} ${b} = ?`, correct, decoy:pickDecoy(correct, op==='×'?a+b:correct+10)};
}
function genDivision(){
  const b=ri(2,10), a=b*ri(2,9);
  const correct=a/b;
  return {q:`${a} ÷ ${b} = ?`, correct, decoy:pickDecoy(correct, a-b, correct+b)};
}
function genSequence(){
  const start=ri(1,5), ratio=ri(2,4);
  const s=[start, start*ratio, start*ratio**2];
  const correct=start*ratio**3;
  return {q:`${s[0]}, ${s[1]}, ${s[2]}, ?`, correct, decoy:pickDecoy(correct, correct-ratio, s[2])};
}
function genPercent(){
  const pct=[10,20,25,50,75][ri(0,5)];
  const base=[20,40,60,80,100,120,200][ri(0,7)];
  const correct=Math.round(pct*base/100);
  return {q:`${pct}% of ${base}`, correct, decoy:pickDecoy(correct, correct+pct, correct-pct)};
}
function genSquare(){
  const n=ri(2,12);
  const correct=n*n;
  return {q:`${n}² = ?`, correct, decoy:pickDecoy(correct, (n-1)*(n-1), n*n+n)};
}
function genSqrt(){
  const n=ri(2,10);
  return {q:`√${n*n} = ?`, correct:n, decoy:pickDecoy(n, n+2)};
}

// Hard-tier generators (prestige 1+)
function genPower(){
  const base=ri(2,4), exp=ri(2,5);
  const correct=base**exp;
  return {q:`${base}${sup(exp)} = ?`, correct, decoy:pickDecoy(correct, base**(exp-1), correct-base)};
}
function genXOR(){
  const a=ri(0,2), b=ri(0,2);
  const correct=a^b;
  return {q:`${a} XOR ${b} = ?`, correct, decoy:correct===0?1:0};
}
function genModulo(){
  const b=ri(3,7); let a=ri(b+1, b*5);
  const correct=a%b;
  return {q:`${a} mod ${b} = ?`, correct, decoy:pickDecoy(correct, correct+1, b-correct)};
}
function genNOT_AND(){
  const a=ri(0,2), b=ri(0,2);
  const correct=(a&b)===1?0:1;
  return {q:`NOT(${a} AND ${b})=?`, correct, decoy:correct===0?1:0};
}
function genFactorial(){
  const n=ri(3,6);
  const correct=fact(n);
  return {q:`${n}! = ?`, correct, decoy:pickDecoy(correct, fact(n-1), fact(n)+n)};
}
function genFactRatio(){
  const n=ri(4,7);
  return {q:`${n}! ÷ ${n-1}! = ?`, correct:n, decoy:pickDecoy(n, n*(n-1), n+1)};
}
function genBinary(){
  const n=ri(5,15);
  const correct=n;
  return {q:`0b${n.toString(2).padStart(4,'0')} = ?`, correct, decoy:pickDecoy(correct, n+2, n-2)};
}
function genLog2(){
  const exp=ri(1,5);
  const correct=exp;
  return {q:`log₂(${2**exp}) = ?`, correct, decoy:pickDecoy(correct, exp+1)};
}
function genFloor(){
  const n=ri(2,15), dec=ri(1,9);
  return {q:`⌊${n}.${dec}⌋ = ?`, correct:n, decoy:n+1};
}
function genAlgebra(){
  const n=ri(2,10);
  return {q:`x²=${n*n}, x=?`, correct:n, decoy:pickDecoy(n, n+1, n+2)};
}
function genSum(){
  const n=ri(3,8);
  const correct=n*(n+1)/2;
  return {q:`∑1..${n} = ?`, correct, decoy:pickDecoy(correct, correct+n, correct-n)};
}
function genGCD(){
  const f=ri(2,6), a=f*ri(2,5), b=f*ri(2,5);
  return {q:`GCD(${a},${b}) = ?`, correct:f, decoy:pickDecoy(f, f*2, f+1)};
}

const GENS_NORMAL = [genArithmetic, genDivision, genSequence, genPercent, genSquare, genSqrt];
const GENS_HARD   = [genPower, genXOR, genModulo, genNOT_AND, genFactorial, genFactRatio,

function ri(a,b){ return Math.floor(Math.random()*(b-a))+a; }
function rf(a,b){ return Math.random()*(b-a)+a; }
function hslToHex(h,s,l){
  s/=100; l/=100;
  const k=n=>(n+h/30)%12, a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return '#'+[0,8,4].map(n=>Math.round(255*f(n)).toString(16).padStart(2,'0')).join('');
}

// ── Platform ──────────────────────────────────────────────────────────────────
class Platform {
  constructor(x,y,w,ci,type,label){
    this.x=x; this.y=y; this.w=w; this.h=PLAT_H;
    this.ci    = ci ?? ri(0, THEMES[theme].plat.length);
    this.type  = type ?? 'normal';
    this.label = label ?? null;
    this.vx    = this.type==='moving' ? rf(-1.5,1.5) : 0;
    this.bounce= 1;
    this.hasPow= false; // set by generatePlatforms based on gap clearance
    this.powT  = Math.random()<0.5 ? 0 : 1; // 50% speed, 50% boost — shield only via guaranteeShield
    this.powOk = false;
    this.crumble=0;
    this.dead  = false;
    this.cpUsed= false;
  }
  update(){
    if(this.type==='moving'){ this.x+=this.vx; if(this.x<0||this.x+this.w>W) this.vx*=-1; }
    if(this.bounce>1) this.bounce=Math.max(1,this.bounce-0.05);
    if(this.crumble>0){ this.crumble++; if(this.crumble>35) this.dead=true; }
  }
  get color(){
    if(this.type==='checkpoint')  return GOLD;
    if(this.type==='ch_correct')  return '#00b4d8';
    if(this.type==='ch_wrong')    return '#ff9f43';
    return THEMES[theme].plat[this.ci % THEMES[theme].plat.length];
  }
  draw(cam){
    const sy = this.y-cam;
    if(sy>H+20||sy<-60) return;
    const alpha = this.crumble>0 ? Math.max(0,1-this.crumble/35) : 1;
    ctx.globalAlpha = alpha;
    const mx=this.x+this.w/2, my=sy+this.h/2;
    ctx.save();
    ctx.translate(mx,my); ctx.scale(this.bounce,1/this.bounce);
    if(this.type==='checkpoint'&&!IS_MOBILE){ ctx.shadowColor=GOLD; ctx.shadowBlur=22; }
    ctx.beginPath(); ctx.roundRect(-this.w/2,-this.h/2,this.w,this.h,7);
    ctx.fillStyle=this.color; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.28)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore();
    // Labels
    if(this.label){
      ctx.fillStyle='#000'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
      ctx.fillText(this.label, this.x+this.w/2, sy+PLAT_H-2);
    }
    if(this.type==='checkpoint'){
      ctx.fillStyle='#000'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
      ctx.fillText('✓ CHECKPOINT', this.x+this.w/2, sy+PLAT_H-2);
    }
    ctx.globalAlpha=1;
    // Power-up orb
    if(this.hasPow&&!this.powOk){
      const CFG=[{e:'⚡',c:'#ffd166'},{e:'🟢',c:'#00cec9'},{e:'🛡',c:'#a29bfe'}];
      const cfg=CFG[this.powT%3];
      const bob=Math.sin(frameCount*0.07+this.x)*3;
      const px=this.x+this.w/2, py=sy-28+bob;
      ctx.save(); if(!IS_MOBILE){ ctx.shadowColor=cfg.c; ctx.shadowBlur=14; }
      ctx.fillStyle=cfg.c+'bb'; ctx.beginPath(); ctx.arc(px,py,12,0,Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.font='13px sans-serif'; ctx.textAlign='center'; ctx.fillText(cfg.e,px,py+5);
    }
  }
}

// ── Player ────────────────────────────────────────────────────────────────────
class Player {
  constructor(){
    this.x=W/2-14; this.y=0; this.vx=0; this.vy=0;
    this.w=28; this.h=32; this.dir=1;
    this.trail=[]; this.squish=0;
    this.boosted=0; this.shielded=0; this.speedy=0; this.debuff=0;
    this.score=0; this.lastPlatY=0; this.lastScore=0;
    this.runDir=0; this.runFrames=0; this.lastLandedPlat=null;
  }
  get cx(){ return this.x+this.w/2; }
  get bottom(){ return this.y+this.h; }
  applyPow(t){
    const C=[{c:'#ffd166',label:'⚡ SPEED'},{c:'#00cec9',label:'↑ BOOST JUMP'},{c:'#a29bfe',label:'🛡 SHIELD'}];
    if(t===0){ this.speedy =120; SFX.powerSpeed();  }
    if(t===1){ this.boosted=60;  SFX.powerJump();   }
    if(t===2){ this.shielded=180;SFX.powerShield(); }
    const cfg=C[t%3];
    scorePops.push({x:this.cx,sy:this.y-camY-30,val:cfg.label,life:1,c:cfg.c});
    spawnP(this.cx,this.y+this.h/2,10,[cfg.c,'#fff']);
  }
  springJump(){
    this.vy=JUMP*3;
    spawnP(this.cx,this.bottom,25,[GOLD,'#fff','#06d6a0','#ffd166']);
  }
  applyDebuff(){
    this.debuff=200;
    spawnP(this.cx,this.bottom,14,['#8B4513','#a0522d','#ff6b6b']);
  }
  update(){
    const spd = this.speedy>0?5.5 : this.debuff>0?1.8 : 3.8;
    const goL  = keys['ArrowLeft'] ||keys['a']||keys['A']||touched.left;
    const goR  = keys['ArrowRight']||keys['d']||keys['D']||touched.right;
    const curDir=goL?-1:goR?1:0;
    if(curDir!==0&&curDir===this.runDir) this.runFrames=Math.min(this.runFrames+1,60);
    else{ this.runDir=curDir; this.runFrames=curDir!==0?1:0; }
    if(goL){ this.vx=-spd; this.dir=-1; }
    else if(goR){ this.vx=spd;  this.dir= 1; }
    else this.vx*=0.78;
    this.vy+=GRAVITY;
    this.x+=this.vx; this.y+=this.vy;
    if(this.x<0)         { this.x=0;        this.vx= Math.abs(this.vx)*0.55; }
    if(this.x+this.w>W)  { this.x=W-this.w; this.vx=-Math.abs(this.vx)*0.55; }
    if(this.squish>0)  this.squish--;
    if(this.speedy>0)  this.speedy--;
    if(this.boosted>0) this.boosted--;
    if(this.shielded>0 && !activePrompt) this.shielded--;
    if(this.debuff>0)  this.debuff--;
    this.trail.push({x:this.cx,y:this.y+this.h/2});
    if(this.trail.length>8) this.trail.shift();
    for(const p of platforms){
      if(p.dead) continue;
      if(this.vy>=0
        &&this.bottom>p.y&&this.bottom<p.y+p.h+14
        &&this.cx>p.x-4  &&this.cx<p.x+p.w+4){
        this.y =p.y-this.h;
        this.vy=this.boosted>0?JUMP*1.4:JUMP;
        if(this.runFrames>=25){ this.vx=this.runDir*(spd+1.8); this.vy*=1.1; }
        this.squish=8; p.bounce=1.15; SFX.jump();
        if(p===this.lastLandedPlat){ combo=0; comboTimer=0; } else { combo++; comboTimer=180; }
        this.lastLandedPlat=p;
        spawnP(this.cx,this.bottom,4,[THEMES[theme].plat[p.ci%THEMES[theme].plat.length]||GOLD]);
        if(p.hasPow&&!p.powOk){ p.powOk=true; this.applyPow(p.powT); }
        // Challenge resolution — remove both platforms regardless of which was landed on
        if(p.type==='ch_correct' || p.type==='ch_wrong'){
          activePrompt=null;
          platforms.forEach(cp=>{ if(cp.type==='ch_correct'||cp.type==='ch_wrong') cp.dead=true; });
          if(p.type==='ch_correct'){ this.shielded=0; this.springJump(); SFX.challengeCorrect(); }
          else{
            SFX.challengeWrong();
            if(this.shielded>0){
              this.shielded=0;
              spawnP(this.cx,this.bottom,12,['#a29bfe','#fff','#c8b0ff']);
              scorePops.push({x:this.cx,sy:this.y-camY-18,val:'✗ SHIELDED',life:1,c:'#a29bfe'});
            } else{ this.applyDebuff(); }
          }
        }
        // Checkpoint platform — rest reward only; mechanics are height-based below
        if(p.type==='checkpoint' && !p.cpUsed){
          p.cpUsed = true;
          cpStreak++;
          hazardPause = PAUSE_FRAMES; // rest point: only granted if player lands on platform
          themeFlash = 28;
          spawnP(this.cx,this.bottom,35,[GOLD,'#fff','#ffd166']);
        }
        if(p.y<this.lastPlatY){
          const ns=Math.round(Math.abs(p.y)/40);
          if(ns>this.score){
            scorePops.push({x:this.cx,sy:this.y-camY-18,val:'+'+(ns-this.score)+'m',life:1});
            // Height-based: theme/hazard/prestige fire regardless of whether checkpoint was landed on
            while(ns>=nextTheme){
              checkpointCount++;
              theme = checkpointCount % THEMES.length;
              nextTheme += CHECKPOINT_EVERY;
              const newPrestige = Math.floor(checkpointCount / THEMES.length);
              if(newPrestige > prestige){ prestige = newPrestige; ngBannerTimer = 220; }
              SFX.checkpoint();
            }
          }
          this.score=ns; this.lastPlatY=p.y;
        }
        break;
      }
    }
  }
  draw(cam){
    const dy=this.y-cam, cx=this.cx;
    if(this.speedy>0){
      for(let i=0;i<this.trail.length;i++){
        const t=this.trail[i];
        const prog=i/this.trail.length;
        ctx.globalAlpha=prog*0.5;
        ctx.strokeStyle=i%2===0?'#ffd166':'#fffbe6';
        ctx.lineWidth=1.5;
        ctx.beginPath();
        const len=6+i*2;
        const yo=(i%3-1)*3;
        ctx.moveTo(t.x,t.y-cam+yo);
        ctx.lineTo(t.x-this.dir*len,t.y-cam+yo);
        ctx.stroke();
      }
    } else {
      for(let i=0;i<this.trail.length;i++){
        const t=this.trail[i];
        ctx.globalAlpha=(i/this.trail.length)*0.18;
        ctx.fillStyle=skinColor; ctx.beginPath();
        ctx.ellipse(t.x,t.y-cam,7,9,0,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.globalAlpha=1;
    if(this.shielded>0){
      ctx.save(); ctx.strokeStyle='#a29bfe'; ctx.lineWidth=3;
      ctx.globalAlpha=0.5+Math.sin(frameCount*0.2)*0.3;
      ctx.beginPath(); ctx.ellipse(cx,dy+this.h/2,22,26,0,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }
    if(this.speedy>0){
      ctx.save(); ctx.strokeStyle='#ffd166'; ctx.lineWidth=2.5;
      ctx.setLineDash([5,3]);
      ctx.globalAlpha=0.55+Math.sin(frameCount*0.4)*0.35;
      ctx.beginPath(); ctx.roundRect(cx-14,dy-2,28,this.h+4,7); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
    if(this.debuff>0){
      ctx.save(); ctx.globalAlpha=0.35; ctx.fillStyle='#6b3a2a';
      ctx.beginPath(); ctx.ellipse(cx,dy+this.h,18,9,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.save();
    ctx.translate(cx,dy+this.h); ctx.scale(this.dir,1);
    ctx.fillStyle=skinColor+'55'; ctx.beginPath();
    ctx.ellipse(0,0,10,4,0,0,Math.PI*2); ctx.fill();
    const sy2=this.squish>0?1.3-(this.squish/8)*0.3:1;
    ctx.scale(1,1/sy2); ctx.translate(0,-this.h);
    ctx.fillStyle='#3a2510'; ctx.beginPath(); ctx.roundRect(-12,16,24,16,4); ctx.fill();
    ctx.scale(1,sy2);
    ctx.fillStyle=skinColor; ctx.beginPath(); ctx.roundRect(-11,0,22,22,[8,8,2,2]); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath();
    ctx.ellipse(-4,9,4,4.5,0,0,Math.PI*2); ctx.ellipse(4,9,4,4.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1a1a2e'; ctx.beginPath();
    ctx.ellipse(-3.5,9.5,2.5,2.5,0,0,Math.PI*2); ctx.ellipse(4.5,9.5,2.5,2.5,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.fillStyle=GOLD; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
    ctx.fillText(PLAYER_NAME.length>10?PLAYER_INITIALS:PLAYER_NAME, cx, dy-6);
  }
}

// ── Particles ─────────────────────────────────────────────────────────────────
class Particle {
  constructor(x,y,c){ this.x=x;this.y=y;this.vx=rf(-3,3);this.vy=rf(-4,-1);this.c=c;this.life=1;this.r=rf(3,7); }
  update(){ this.x+=this.vx;this.y+=this.vy;this.vy+=0.15;this.life-=0.04; }
  draw(cam){ ctx.globalAlpha=this.life;ctx.fillStyle=this.c;ctx.beginPath();ctx.arc(this.x,this.y-cam,this.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1; }
}
function spawnP(x,y,n,cols){ for(let i=0;i<n;i++) particles.push(new Particle(x,y,cols[ri(0,cols.length)])); }

// ── Platform generation ───────────────────────────────────────────────────────
function generatePlatforms(fromY,toY){
  let y=fromY;
  while(y>toY){
    const targetPlats=Math.max(50,75-checkpointCount);
    const gap=Math.min(130,2*(4000/targetPlats)-45);
    const gapUsed=rf(45,gap); // capture for power-up clearance check
    y-=gapUsed;
    platSpawnCount++;
    const hm=Math.round(Math.abs(y)/40);

    if(hm>=nextCheckpoint){
      platforms.push(new Platform(0,y,W,0,'checkpoint'));
      nextCheckpoint+=CHECKPOINT_EVERY;
      y -= 62; // 50% of original 125 — helper closer to checkpoint
      platSpawnCount++;
      const hw=Math.max(60,90-Math.abs(y)/1000);
      const hx=rf(0,W-hw);
      const hp=new Platform(hx,y,hw,null,'normal');
      hp.hasPow=Math.random()<0.10; // checkpoint helper always has clearance
      platforms.push(hp);
      continue;
    }

    if(hm>=nextChallenge){
      const gens=prestige===0?GENS_NORMAL:prestige===1?[...GENS_NORMAL,...GENS_HARD]:GENS_HARD;
      const pr=gens[ri(0,gens.length)]();
      const cLeft=Math.random()<0.5;
      const pw=85,g2=20,lx=W/2-(pw*2+g2)/2;
      platforms.push(new Platform(lx,    y,pw,0,cLeft?'ch_correct':'ch_wrong', String(cLeft?pr.correct:pr.decoy)));
      platforms.push(new Platform(lx+pw+g2,y,pw,0,!cLeft?'ch_correct':'ch_wrong',String(!cLeft?pr.correct:pr.decoy)));
      activePrompt=pr;
      nextChallenge+=CHECKPOINT_EVERY+ri(-CHALLENGE_JITTER,CHALLENGE_JITTER);
      guaranteeShield=true; // ensure a shield spawns before the next challenge
      y -= 25; // 25-unit clear buffer above challenge pair before next platform
      continue;
    }

    // Organized chaos: bias x toward a different screen third each step
    const t=Math.random()<0.15?'moving':'normal';
    const w=Math.max(48,88-Math.abs(y)/1000);
    let zone=ri(0,3);
    if(zone===lastPlatZone && Math.random()>0.25) zone=(zone+1+ri(0,2))%3;
    lastPlatZone=zone;
    const zW=W/3;
    const px=Math.max(0,Math.min(W-w, zone*zW+rf(0,Math.max(1,zW-w))));
    const plat=new Platform(px,y,w,null,t);
    plat.hasPow=t==='normal' && Math.random()<Math.max(0.04,0.12-checkpointCount*0.004);
    if(plat.hasPow && guaranteeShield && nextChallenge-hm<=30){ plat.powT=2; guaranteeShield=false; }
    platforms.push(plat);
  }
}

  platforms=[]; particles=[];

// ── Skin helpers ──────────────────────────────────────────────────────────────
function colorFromT(t){
  t=Math.max(0,Math.min(1,t));
  let s0=SKIN_STOPS[0],s1=SKIN_STOPS[1];
  for(let i=0;i<SKIN_STOPS.length-1;i++){
    if(t>=SKIN_STOPS[i][0]&&t<=SKIN_STOPS[i+1][0]){s0=SKIN_STOPS[i];s1=SKIN_STOPS[i+1];break;}
  }
  const r=(s1[0]-s0[0])>0?(t-s0[0])/(s1[0]-s0[0]):0;
  const lerp=(a,b,x)=>Math.round(a+(b-a)*x);
  return '#'+[0,1,2].map(i=>lerp(s0[1][i],s1[1][i],r).toString(16).padStart(2,'0')).join('');
}
function tFromX(x){ return Math.max(0,Math.min(1,(x-SGBX)/SGW)); }
function thumbX(){ return SGBX + skinToneT * SGW; }
function specThumbX(){ return SGBX + specT * SGW; }

let _bgGradCache=null, _bgGradTheme=-1;
function drawBg(){
  const th=THEMES[theme];
  if(theme!==_bgGradTheme||!_bgGradCache){
    _bgGradCache=ctx.createLinearGradient(0,0,0,H);
    _bgGradCache.addColorStop(0,th.bgTop); _bgGradCache.addColorStop(1,th.bgBot);
    _bgGradTheme=theme;
  }
  ctx.fillStyle=_bgGradCache; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.4)';
  for(let i=0;i<STAR_COUNT;i++){
    const sx=(i*137+frameCount*0.1)%W;
    const sy=(i*97+(camY%H)*0.3+frameCount*0.04*(i%3))%H;
    ctx.beginPath(); ctx.arc(sx,sy,i%3===0?1.4:0.6,0,Math.PI*2); ctx.fill();
  }
}

function drawHazard(){
  const th=THEMES[theme];
  const sy=hazardY; // screen-space — no cam offset needed
  if(sy>H) return;
  ctx.beginPath(); ctx.moveTo(0,sy);
  for(let x=0;x<=W;x+=8){
    const wAmp=8+prestige*5, wAmp2=5+prestige*3;
    const w=Math.sin(x*0.04+frameCount*0.1)*wAmp+Math.cos(x*0.07+frameCount*0.07)*wAmp2;
    ctx.lineTo(x,sy+w);
  }
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
  const g=ctx.createLinearGradient(0,sy,0,H);
  g.addColorStop(0,th.hazTop); g.addColorStop(1,th.hazBot);
  ctx.fillStyle=g; ctx.fill();
  if(hazardPause>0){
    ctx.fillStyle=GOLD; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
    ctx.fillText('⏸ PAUSED',W/2,Math.min(sy+20,H-10));
  }
}

function drawChallengeFlash(){
  if(!activePrompt) return;
  const pair=platforms.filter(p=>p.type==='ch_correct'||p.type==='ch_wrong');
  if(!pair.length){ activePrompt=null; return; }
  const cp=pair[0];
  const platSY=cp.y-camY;
  if(platSY>H+20||platSY<-60) return;
  // Float question bubble above the two platforms
  const p2=pair[1];
  const midX=p2?(cp.x+cp.w/2+p2.x+p2.w/2)/2:cp.x+cp.w/2;
  const qy=Math.max(platSY-44, 28);
  ctx.save();
  ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,0.82)';
  ctx.beginPath(); ctx.roundRect(midX-100,qy-22,200,44,10); ctx.fill();
  ctx.strokeStyle=GOLD; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(midX-100,qy-22,200,44,10); ctx.stroke();
  ctx.fillStyle=GOLD; ctx.font='bold 9px sans-serif';
  ctx.fillText('⚡ CHALLENGE',midX,qy-8);
  ctx.fillStyle='#fff'; ctx.font='bold 20px sans-serif';
  ctx.fillText(activePrompt.q,midX,qy+13);
  ctx.restore();
}

function drawPrestigeOverlay(){
  if(prestige<1) return;
  const slAlpha=Math.min(0.18,0.06*prestige);
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,'+slAlpha+')';
  for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,2);
  ctx.restore();
  if(prestige<2) return;
  const shift=Math.min(5,prestige);
  const pulse=0.14+Math.sin(frameCount*0.06)*0.06;
  ctx.save(); ctx.globalAlpha=pulse;
  const gr=ctx.createLinearGradient(0,0,shift*4,0);
  gr.addColorStop(0,'rgba(255,0,60,0.9)'); gr.addColorStop(1,'rgba(255,0,60,0)');
  ctx.fillStyle=gr; ctx.fillRect(0,0,shift*4,H);
  const gb=ctx.createLinearGradient(W,0,W-shift*4,0);
  gb.addColorStop(0,'rgba(0,120,255,0.9)'); gb.addColorStop(1,'rgba(0,120,255,0)');
  ctx.fillStyle=gb; ctx.fillRect(W-shift*4,0,shift*4,H);
  ctx.restore();
}

  ctx.fillStyle='rgba(255,255,255,0.14)';
  ctx.font='22px sans-serif'; ctx.textAlign='center';
  ctx.fillText('◀',W*0.25,H*0.93); ctx.fillText('▶',W*0.75,H*0.93);
}

// ── Skin picker screen ────────────────────────────────────────────────────────
function drawSkinPicker(){
  drawBg();
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle=GOLD; ctx.font='bold 13px sans-serif'; ctx.fillText('VGST PRESENTS',W/2,H/2-150);
  ctx.fillStyle='#fff'; ctx.font='bold 52px sans-serif'; ctx.fillText('LIGHT',W/2,H/2-100);
  ctx.fillStyle=GOLD; ctx.font='bold 52px sans-serif'; ctx.fillText('CLIMB',W/2,H/2-50);
  ctx.fillStyle='#bbb'; ctx.font='14px sans-serif'; ctx.fillText('Choose your look',W/2,H/2-8);

  // ── Skin tone bar (primary) ──────────────────────────────────────────────────
  const sgby=H/2+SGBY_OFF;
  ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.font='bold 9px sans-serif'; ctx.textAlign='left';
  ctx.fillText('SKIN TONES',SGBX,sgby-4);
  const g=ctx.createLinearGradient(SGBX,0,SGBX+SGW,0);
  SKIN_STOPS.forEach(([t,[r,gg,b]])=>g.addColorStop(t,`rgb(${r},${gg},${b})`));
  ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(SGBX,sgby,SGW,SGH,8); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5; ctx.stroke();
  const tx2=thumbX();
  ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.fillStyle=colorFromT(skinToneT);
  ctx.beginPath(); ctx.arc(tx2,sgby+SGH/2,15,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // ── Spectrum bar (all colors) ────────────────────────────────────────────────
  const specby=H/2+SPEC_Y_OFF;
  ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.font='bold 9px sans-serif'; ctx.textAlign='left';
  ctx.fillText('ALL COLORS',SGBX,specby-5);
  const sg=ctx.createLinearGradient(SGBX,0,SGBX+SGW,0);
  for(let i=0;i<=12;i++) sg.addColorStop(i/12,hslToHex(i/12*360,90,55));
  ctx.fillStyle=sg; ctx.beginPath(); ctx.roundRect(SGBX,specby,SGW,SPEC_H,6); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5; ctx.stroke();
  const stx=specThumbX();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2.5; ctx.fillStyle=hslToHex(specT*360,90,55);
  ctx.beginPath(); ctx.arc(stx,specby+SPEC_H/2,11,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Character preview
  drawCharPreview(W/2, specby+SPEC_H+46);

  // Play button
  ctx.fillStyle=GOLD; ctx.textAlign='center';
  ctx.beginPath(); ctx.roundRect(W/2-80,specby+SPEC_H+96,160,50,12); ctx.fill();
  ctx.fillStyle='#000'; ctx.font='bold 20px sans-serif';
  ctx.fillText('PLAY →',W/2,specby+SPEC_H+128);
}

function drawCharPreview(cx,cy){
  ctx.save(); ctx.translate(cx,cy);
  ctx.fillStyle='#3a2510'; ctx.beginPath(); ctx.roundRect(-12,16,24,16,4); ctx.fill();
  ctx.fillStyle=skinColor; ctx.beginPath(); ctx.roundRect(-11,0,22,22,[8,8,2,2]); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath();
  ctx.ellipse(-4,9,4,4.5,0,0,Math.PI*2); ctx.ellipse(4,9,4,4.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1a2e'; ctx.beginPath();
  ctx.ellipse(-3.5,9.5,2.5,2.5,0,0,Math.PI*2); ctx.ellipse(4.5,9.5,2.5,2.5,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Start / Game-over screens ─────────────────────────────────────────────────
function drawStart(){
  drawBg();
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle=GOLD; ctx.font='bold 13px sans-serif'; ctx.fillText('VGST PRESENTS',W/2,H/2-130);
  ctx.fillStyle='#fff'; ctx.font='bold 52px sans-serif'; ctx.fillText('LIGHT',W/2,H/2-80);
  ctx.fillStyle=GOLD; ctx.font='bold 52px sans-serif'; ctx.fillText('CLIMB',W/2,H/2-30);
  if(TG_USER){ ctx.fillStyle='#ccc'; ctx.font='15px sans-serif'; ctx.fillText('Welcome, '+PLAYER_NAME+'! 👋',W/2,H/2+8); }
  else{ ctx.fillStyle='#888'; ctx.font='14px sans-serif'; ctx.fillText('Climb. Survive. Answer.',W/2,H/2+8); }
  ctx.fillStyle=GOLD; ctx.beginPath(); ctx.roundRect(W/2-80,H/2+28,160,50,12); ctx.fill();
  ctx.fillStyle='#000'; ctx.font='bold 20px sans-serif'; ctx.fillText('TAP TO PLAY',W/2,H/2+60);
  ctx.fillStyle='#555'; ctx.font='12px sans-serif';
  ctx.fillText('← → Arrow keys / WASD',W/2,H/2+110);
  ctx.fillText('Mobile: tap left / right half to move',W/2,H/2+128);
  ctx.fillStyle='#6c5ce7'; ctx.font='13px sans-serif';
  ctx.fillText('Two-color platforms = math challenge!',W/2,H/2+150);
}

function drawGameOver(){
  drawBg();
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#fff'; ctx.font='bold 30px sans-serif'; ctx.fillText('CAUGHT!',W/2,H/2-90);
  ctx.fillStyle='#ff6b6b'; ctx.font='bold 16px sans-serif';
  ctx.fillText(THEMES[theme].hazLabel+' floor got you!',W/2,H/2-54);
  ctx.fillStyle=GOLD; ctx.font='16px sans-serif';
  ctx.fillText('Height: '+player.score+'m',W/2,H/2-8);
  ctx.fillStyle='#aaa'; ctx.fillText('Checkpoints: '+checkpointCount,W/2,H/2+18);
  if(player.score>highScore){
    highScore=player.score;
    localStorage.setItem('lc_hs',highScore);
    ctx.fillStyle=GOLD; ctx.font='bold 15px sans-serif'; ctx.fillText('🎉 NEW HIGH SCORE!',W/2,H/2+50);
  }
  ctx.fillStyle='#666'; ctx.font='13px sans-serif'; ctx.fillText('Best: '+highScore+'m',W/2,H/2+72);
  ctx.fillStyle=GOLD; ctx.beginPath(); ctx.roundRect(W/2-80,H/2+88,160,50,12); ctx.fill();
  ctx.fillStyle='#000'; ctx.font='bold 18px sans-serif'; ctx.fillText('PLAY AGAIN',W/2,H/2+120);
  if(tg){
    ctx.strokeStyle='rgba(212,175,55,0.65)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(W/2-72,H/2+150,144,38,10); ctx.stroke();
    ctx.fillStyle='#aaa'; ctx.font='13px sans-serif';
    ctx.fillText('📤 Share Score',W/2,H/2+174);
  }
}

// ── Physics tick (always runs at 60 fps equivalent via accumulator) ───────────
function physicsFrame(){
  frameCount++;
  if(gamePaused) return;

  // Freeze all physics during death animation — only advance timers and counter
  if(caughtTimer>0){
    if(comboTimer>0){ comboTimer--; } else { combo=0; }
    if(themeFlash>0)    themeFlash--;
    if(ngBannerTimer>0) ngBannerTimer--;
    if(hurryUpDisplay>0)hurryUpDisplay--;
    caughtTimer++;
    if(caughtTimer>=48){ caughtTimer=0; state='gameover'; }
    return;
  }

  player.update();

  // Hurry Up: first fires 60 s in (grace period), then every 30 s after
  scrollHurryTimer++;
  if(scrollHurryTimer>=HURRY_INTERVAL){
    scrollHurryTimer=0; cameraScrollSpeed+=HURRY_SPEED_INC; hurryUpDisplay=220; SFX.hurryUp();
  }

  // Camera + hazard unified: both pause during checkpoint rest
  const target=player.y-H*0.45;
  if(hazardPause>0){
    hazardPause--;
    camY+=(target-camY)*0.08; // smooth follow only — forced scroll pauses at checkpoints
  } else {
    camY=Math.min(camY+(target-camY)*0.08, camY-cameraScrollSpeed);
  }

  if(player.y<topReached+1200){ generatePlatforms(topReached,topReached-400); topReached-=400; }

  platforms=platforms.filter(p=>!p.dead&&p.y-camY<H+100);
  platforms.forEach(p=>p.update());
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>p.update());

  // Decrement all animation timers here so they run at physics rate
  if(comboTimer>0){ comboTimer--; } else { combo=0; }
  if(themeFlash>0)    themeFlash--;
  if(ngBannerTimer>0) ngBannerTimer--;
  if(hurryUpDisplay>0)hurryUpDisplay--;

  scorePops=scorePops.filter(p=>p.life>0);
  scorePops.forEach(p=>{ p.sy-=1.2; p.life-=0.025; });

  // Death: hazard (screen-space) reaches player's feet
  if(player.bottom-camY > hazardY){
    if(!scoreSubmitted){ scoreSubmitted=true; if(player.score>=MIN_SCORE_TO_RECORD) submitScore(player.score, checkpointCount); }
    spawnP(player.cx,player.bottom,50,['#ff4466','#ff0033','#fff','#ffd166']);
    SFX.caught(); caughtTimer=1;
  }
}

// ── Game loop (fixed-step physics ensures consistent speed on all devices) ────
function gameLoop(ts=performance.now()){
  requestAnimationFrame(gameLoop);
  if(state==='skin')    { frameCount++; drawSkinPicker(); return; }
  if(state==='start')   { frameCount++; drawStart();      return; }
  if(state==='gameover'){ frameCount++; drawGameOver();   return; }

  // Accumulate real time; run physics in fixed 16.67 ms steps
  if(!_ltTs) _ltTs=ts;
  _lacc+=Math.min(ts-_ltTs, 200); // cap at 200 ms to avoid spiral after tab switch
  _ltTs=ts;
  const STEP=1000/60;
  while(_lacc>=STEP){ _lacc-=STEP; physicsFrame(); }

  // ── Draw ──────────────────────────────────────────────────────────────────
  drawBg();
  if(themeFlash>0){
    ctx.save(); ctx.globalAlpha=(themeFlash/28)*0.55;
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
  drawHazard();
  platforms.forEach(p=>p.draw(camY));
  particles.forEach(p=>p.draw(camY));
  player.draw(camY);
  scorePops.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.fillStyle=p.c??GOLD; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
    ctx.fillText(p.val,p.x,p.sy);
    ctx.restore();
  });
  drawTouchZones();
  drawHazardWarning();
  drawPrestigeOverlay();
  drawChallengeFlash();
  drawPowerUpHUD();
  drawHUD();

  if(gamePaused){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#fff'; ctx.font='bold 28px sans-serif'; ctx.fillText('⏸ PAUSED',W/2,H/2);
    ctx.fillStyle='#888'; ctx.font='13px sans-serif'; ctx.fillText('Tap score panel to resume',W/2,H/2+28);
    ctx.restore();
    return;
  }

  // Death animation draw layer (state transition happens in physicsFrame)
  if(caughtTimer>0){
    const cf=Math.min(1,caughtTimer/18);
    ctx.save(); ctx.globalAlpha=cf*0.72; ctx.fillStyle='#ff0033'; ctx.fillRect(0,0,W,H); ctx.restore();
    ctx.save(); ctx.globalAlpha=cf; ctx.textAlign='center';
    ctx.fillStyle='#fff'; ctx.font='bold 32px sans-serif'; ctx.fillText('CAUGHT!',W/2,H/2);
    ctx.restore();
  }
}

// ── Input ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(state==='start')   { state='playing'; initGame(); }
  if(state==='gameover'&&e.key==='Enter'){ state='playing'; initGame(); }
});
document.addEventListener('keyup',e=>{ keys[e.key]=false; });

C.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const rect=C.getBoundingClientRect();
  const cx=(e.clientX-rect.left)*(W/rect.width);
  const cy=(e.clientY-rect.top)*(H/rect.height);
  const sgby=H/2+SGBY_OFF;
  const specby=H/2+SPEC_Y_OFF;
  if(state==='skin'){
    if(cy>=sgby-12&&cy<=sgby+SGH+12){
      skinDragging=true; skinToneT=tFromX(cx); skinColor=colorFromT(skinToneT); return;
    }
    if(cy>=specby-10&&cy<=specby+SPEC_H+10){
      specDragging=true; specT=Math.max(0,Math.min(1,(cx-SGBX)/SGW));
      skinColor=hslToHex(specT*360,90,55); return;
    }
    if(cy>specby+SPEC_H+96&&cy<specby+SPEC_H+148&&cx>W/2-80&&cx<W/2+80){ state='start'; return; }
    return;
  }
  if(state==='start'){ state='playing'; initGame(); return; }
  if(state==='gameover'){
    if(cy>H/2+145&&cy<H/2+192&&cx>W/2-72&&cx<W/2+72){ shareScore(); return; }
    if(cy>H/2+85&&cy<H/2+145&&cx>W*0.22&&cx<W*0.78){ state='playing'; initGame(); }
    return;
  }
  if(state==='playing'&&cx>=8&&cx<=148&&cy>=8&&cy<=60){ gamePaused=!gamePaused; return; }
  if(cx<W/2) touched.left=true; else touched.right=true;
},{passive:false});

C.addEventListener('pointermove',e=>{
  const rect=C.getBoundingClientRect();
  const cx=(e.clientX-rect.left)*(W/rect.width);
  const cy=(e.clientY-rect.top)*(H/rect.height);
  if(skinDragging){ skinToneT=tFromX(cx); skinColor=colorFromT(skinToneT); return; }
  if(specDragging){ specT=Math.max(0,Math.min(1,(cx-SGBX)/SGW)); skinColor=hslToHex(specT*360,90,55); return; }
  if(!touched.left&&!touched.right) return;
  touched.left=cx<W/2; touched.right=cx>=W/2;
});
C.addEventListener('pointerup',()=>{ skinDragging=false; specDragging=false; touched.left=false; touched.right=false; });

requestAnimationFrame(gameLoop);
</script>
