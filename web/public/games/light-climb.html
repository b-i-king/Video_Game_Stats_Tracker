// ── Themes ────────────────────────────────────────────────────────────────────
const THEMES = [
  { name:'Space Station', bgTop:'#0d0d2b', bgBot:'#1a1150',
    plat:['#ff6b6b','#ffd166','#06d6a0','#118ab2','#ff9f43','#a29bfe'],

  { name:'Digital Forest',bgTop:'#001a0d', bgBot:'#002b12',

  { name:'Data Core',     bgTop:'#001a2e', bgBot:'#003355',

    hazTop:'rgba(255,140,0,0.85)', hazBot:'rgba(255,34,0,0.9)',    hazLabel:'🪙 GOLD RISING' },
];

// ── Dynamic prompt generators ─────────────────────────────────────────────────
const SUP = ['⁰','¹','²','³','⁴','⁵','⁶','⁷','⁸','⁹'];
function sup(n){ return SUP[n] ?? '^'+n; }
function fact(n){ let r=1; for(let i=2;i<=n;i++) r*=i; return r; }
function pickDecoy(correct, ...extras){
  const cands=[...extras, correct+1, correct-1, correct+2, correct-2]
    .filter(d=>d!==correct && d>=0 && Number.isInteger(d));
  return cands.length ? cands[ri(0,cands.length)] : correct+1;
}

// Normal-tier generators (prestige 0)
function genArithmetic(){
  const a=ri(2,12), b=ri(2,12);
  const ops=['+','-','×'], op=ops[ri(0,3)];
  const correct = op==='+'?a+b : op==='-'?a-b : a*b;
  return {q:`${a} ${op} ${b} = ?`, correct, decoy:pickDecoy(correct, op==='×'?a+b:correct+10)};
}
function genDivision(){
  const b=ri(2,10), a=b*ri(2,9);
  const correct=a/b;
  return {q:`${a} ÷ ${b} = ?`, correct, decoy:pickDecoy(correct, a-b, correct+b)};
}
function genSequence(){
  const start=ri(1,5), ratio=ri(2,4);
  const s=[start, start*ratio, start*ratio**2];
  const correct=start*ratio**3;
  return {q:`${s[0]}, ${s[1]}, ${s[2]}, ?`, correct, decoy:pickDecoy(correct, correct-ratio, s[2])};
}
function genPercent(){
  const pct=[10,20,25,50,75][ri(0,5)];
  const base=[20,40,60,80,100,120,200][ri(0,7)];
  const correct=Math.round(pct*base/100);
  return {q:`${pct}% of ${base}`, correct, decoy:pickDecoy(correct, correct+pct, correct-pct)};
}
function genSquare(){
  const n=ri(2,12);
  const correct=n*n;
  return {q:`${n}² = ?`, correct, decoy:pickDecoy(correct, (n-1)*(n-1), n*n+n)};
}
function genSqrt(){
  const n=ri(2,10);
  return {q:`√${n*n} = ?`, correct:n, decoy:pickDecoy(n, n+2)};
}

// Hard-tier generators (prestige 1+)
function genPower(){
  const base=ri(2,4), exp=ri(2,5);
  const correct=base**exp;
  return {q:`${base}${sup(exp)} = ?`, correct, decoy:pickDecoy(correct, base**(exp-1), correct-base)};
}
function genXOR(){
  const a=ri(0,2), b=ri(0,2);
  const correct=a^b;
  return {q:`${a} XOR ${b} = ?`, correct, decoy:correct===0?1:0};
}
function genModulo(){
  const b=ri(3,7); let a=ri(b+1, b*5);
  const correct=a%b;
  return {q:`${a} mod ${b} = ?`, correct, decoy:pickDecoy(correct, correct+1, b-correct)};
}
function genNOT_AND(){
  const a=ri(0,2), b=ri(0,2);
  const correct=(a&b)===1?0:1;
  return {q:`NOT(${a} AND ${b})=?`, correct, decoy:correct===0?1:0};
}
function genFactorial(){
  const n=ri(3,6);
  const correct=fact(n);
  return {q:`${n}! = ?`, correct, decoy:pickDecoy(correct, fact(n-1), fact(n)+n)};
}
function genFactRatio(){
  const n=ri(4,7);
  return {q:`${n}! ÷ ${n-1}! = ?`, correct:n, decoy:pickDecoy(n, n*(n-1), n+1)};
}
function genBinary(){
  const n=ri(5,15);
  const correct=n;
  return {q:`0b${n.toString(2).padStart(4,'0')} = ?`, correct, decoy:pickDecoy(correct, n+2, n-2)};
}
function genLog2(){
  const exp=ri(1,5);
  const correct=exp;
  return {q:`log₂(${2**exp}) = ?`, correct, decoy:pickDecoy(correct, exp+1)};
}
function genFloor(){
  const n=ri(2,15), dec=ri(1,9);
  return {q:`⌊${n}.${dec}⌋ = ?`, correct:n, decoy:n+1};
}
function genAlgebra(){
  const n=ri(2,10);
  return {q:`x²=${n*n}, x=?`, correct:n, decoy:pickDecoy(n, n+1, n+2)};
}
function genSum(){
  const n=ri(3,8);
  const correct=n*(n+1)/2;
  return {q:`∑1..${n} = ?`, correct, decoy:pickDecoy(correct, correct+n, correct-n)};
}
function genGCD(){
  const f=ri(2,6), a=f*ri(2,5), b=f*ri(2,5);
  return {q:`GCD(${a},${b}) = ?`, correct:f, decoy:pickDecoy(f, f*2, f+1)};
}

const GENS_NORMAL = [genArithmetic, genDivision, genSequence, genPercent, genSquare, genSqrt];
const GENS_HARD   = [genPower, genXOR, genModulo, genNOT_AND, genFactorial, genFactRatio,
                     genBinary, genLog2, genFloor, genAlgebra, genSum, genGCD];

// ── Skin gradient stops (light → deep) ────────────────────────────────────────
const SKIN_STOPS = [
  [0,    [0xFD,0xDB,0xB4]],
  [0.15, [0xF5,0xC8,0x9C]],
  [0.30, [0xE8,0xA8,0x7C]],
  [0.45, [0xD4,0x87,0x5A]],
  [0.60, [0xC2,0x6B,0x3A]],
  [0.75, [0xA0,0x52,0x2D]],
  [0.88, [0x7B,0x3F,0x1E]],
  [1.00, [0x4A,0x25,0x11]],
];
const SGBX = 40, SGBY_OFF = 48, SGW = W-80, SGH = 28; // gradient bar geometry
const SPEC_H = 20, SPEC_Y_OFF = SGBY_OFF + SGH + 24;   // spectrum bar (below skin tones)

// ── Constants ─────────────────────────────────────────────────────────────────
const GRAVITY            = 0.45;
const JUMP               = -11.5;
const PLAT_H             = 14;
const GOLD               = '#D4AF37';
const CHECKPOINT_EVERY   = 100;   // metres between checkpoints
const CHALLENGE_EVERY    = 50;    // metres between challenges
const CHALLENGE_JITTER   = 8;
const HAZARD_START_SPEED = 0.55;
const HAZARD_MULT        = 1.15;  // speed multiplier per checkpoint
const PAUSE_FRAMES       = 180;   // hazard pause at checkpoint (3 s @ 60 fps)
const CHALLENGE_DIST     = 380;   // show flash when this close (world units above player)

// ── State ─────────────────────────────────────────────────────────────────────
let state = 'skin';
let skinColor = '#E8A87C';
let skinDragging = false, specDragging = false;
let skinToneT = 0.30, specT = 0.5;

let frameCount = 0, highScore = parseInt(localStorage.getItem('lc_hs')||'0');
let camY = 0, topReached = 50;
let combo = 0, comboTimer = 0;
let platforms = [], particles = [];
let player;

let platSpawnCount = 0, nextChallenge = 0, nextCheckpoint = CHECKPOINT_EVERY;
let hazardY = 0, hazardSpeed = HAZARD_START_SPEED, hazardPause = 0;
let checkpointCount = 0, theme = 0;
let prestige = 0, ngBannerTimer = 0, themeFlash = 0;
let activePrompt = null;   // { q, correct, decoy } — set when challenge generated
let scoreSubmitted = false;
let gamePaused = false;
let scorePops = [], cpStreak = 0;
let keys = {}, touched = { left:false, right:false };

function ri(a,b){ return Math.floor(Math.random()*(b-a))+a; }
function rf(a,b){ return Math.random()*(b-a)+a; }
function hslToHex(h,s,l){
  s/=100; l/=100;
  const k=n=>(n+h/30)%12, a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return '#'+[0,8,4].map(n=>Math.round(255*f(n)).toString(16).padStart(2,'0')).join('');
}

// ── Platform ──────────────────────────────────────────────────────────────────
class Platform {
  constructor(x,y,w,ci,type,label){
    this.x=x; this.y=y; this.w=w; this.h=PLAT_H;
    this.ci    = ci ?? ri(0, THEMES[theme].plat.length);
    this.type  = type ?? 'normal';
    this.label = label ?? null;
    this.vx    = this.type==='moving' ? rf(-1.5,1.5) : 0;
    this.bounce= 1;
    this.hasPow= this.type==='normal' && Math.random()<0.10;
    this.powT  = ri(0,3);
    this.powOk = false;
    this.crumble=0;
    this.dead  = false;
    this.cpUsed= false;
  }
  update(){
    if(this.type==='moving'){ this.x+=this.vx; if(this.x<0||this.x+this.w>W) this.vx*=-1; }
    if(this.bounce>1) this.bounce=Math.max(1,this.bounce-0.05);
    if(this.crumble>0){ this.crumble++; if(this.crumble>35) this.dead=true; }
  }
  get color(){
    if(this.type==='checkpoint')  return GOLD;
    if(this.type==='ch_correct')  return '#00b4d8';
    if(this.type==='ch_wrong')    return '#ff9f43';
    return THEMES[theme].plat[this.ci % THEMES[theme].plat.length];
  }
  draw(cam){
    const sy = this.y-cam;
    if(sy>H+20||sy<-60) return;
    const alpha = this.crumble>0 ? Math.max(0,1-this.crumble/35) : 1;
    ctx.globalAlpha = alpha;
    const mx=this.x+this.w/2, my=sy+this.h/2;
    ctx.save();
    ctx.translate(mx,my); ctx.scale(this.bounce,1/this.bounce);
    if(this.type==='checkpoint'){ ctx.shadowColor=GOLD; ctx.shadowBlur=22; }
    ctx.beginPath(); ctx.roundRect(-this.w/2,-this.h/2,this.w,this.h,7);
    ctx.fillStyle=this.color; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.28)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore();
    // Labels
    if(this.label){
      ctx.fillStyle='#000'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
      ctx.fillText(this.label, this.x+this.w/2, sy+PLAT_H-2);
    }
    if(this.type==='checkpoint'){
      ctx.fillStyle='#000'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
      ctx.fillText('✓ CHECKPOINT', this.x+this.w/2, sy+PLAT_H-2);
    }
    ctx.globalAlpha=1;
    // Power-up orb
    if(this.hasPow&&!this.powOk){
      const CFG=[{e:'⚡',c:'#ffd166'},{e:'🟢',c:'#00cec9'},{e:'🛡',c:'#a29bfe'}];
      const cfg=CFG[this.powT%3];
      const bob=Math.sin(frameCount*0.07+this.x)*3;
      const px=this.x+this.w/2, py=sy-28+bob;
      ctx.save(); ctx.shadowColor=cfg.c; ctx.shadowBlur=14;
      ctx.fillStyle=cfg.c+'bb'; ctx.beginPath(); ctx.arc(px,py,12,0,Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.font='13px sans-serif'; ctx.textAlign='center'; ctx.fillText(cfg.e,px,py+5);
    }
  }
}

// ── Player ────────────────────────────────────────────────────────────────────
class Player {
  constructor(){
    this.x=W/2-14; this.y=0; this.vx=0; this.vy=0;
    this.w=28; this.h=32; this.dir=1;
    this.trail=[]; this.squish=0;
    this.boosted=0; this.shielded=0; this.speedy=0; this.debuff=0;
    this.score=0; this.lastPlatY=0; this.lastScore=0;
    this.runDir=0; this.runFrames=0; this.lastLandedPlat=null;
  }
  get cx(){ return this.x+this.w/2; }
  get bottom(){ return this.y+this.h; }
  applyPow(t){
    const C=[{c:'#ffd166',label:'⚡ SPEED'},{c:'#00cec9',label:'↑ BOOST JUMP'},{c:'#a29bfe',label:'🛡 SHIELD'}];
    if(t===0) this.speedy =120;
    if(t===1) this.boosted=60;
    if(t===2) this.shielded=180;
    const cfg=C[t%3];
    scorePops.push({x:this.cx,sy:this.y-camY-30,val:cfg.label,life:1,c:cfg.c});
    spawnP(this.cx,this.y+this.h/2,10,[cfg.c,'#fff']);
  }
  springJump(){
    this.vy=JUMP*3;
    spawnP(this.cx,this.bottom,25,[GOLD,'#fff','#06d6a0','#ffd166']);
  }
  applyDebuff(){
    this.debuff=200;
    spawnP(this.cx,this.bottom,14,['#8B4513','#a0522d','#ff6b6b']);
  }
  update(){
    const spd = this.speedy>0?5.5 : this.debuff>0?1.8 : 3.8;
    const goL  = keys['ArrowLeft'] ||keys['a']||keys['A']||touched.left;
    const goR  = keys['ArrowRight']||keys['d']||keys['D']||touched.right;
    const curDir=goL?-1:goR?1:0;
    if(curDir!==0&&curDir===this.runDir) this.runFrames=Math.min(this.runFrames+1,60);
    else{ this.runDir=curDir; this.runFrames=curDir!==0?1:0; }
    if(goL){ this.vx=-spd; this.dir=-1; }
    else if(goR){ this.vx=spd;  this.dir= 1; }
    else this.vx*=0.78;
    this.vy+=GRAVITY;
    this.x+=this.vx; this.y+=this.vy;
    if(this.x<0)         { this.x=0;        this.vx= Math.abs(this.vx)*0.55; }
    if(this.x+this.w>W)  { this.x=W-this.w; this.vx=-Math.abs(this.vx)*0.55; }
    if(this.squish>0)  this.squish--;
    if(this.speedy>0)  this.speedy--;
    if(this.boosted>0) this.boosted--;
    if(this.shielded>0)this.shielded--;
    if(this.debuff>0)  this.debuff--;
    this.trail.push({x:this.cx,y:this.y+this.h/2});
    if(this.trail.length>8) this.trail.shift();
    for(const p of platforms){
      if(p.dead) continue;
      if(this.vy>=0
        &&this.bottom>p.y&&this.bottom<p.y+p.h+14
        &&this.cx>p.x-4  &&this.cx<p.x+p.w+4){
        this.y =p.y-this.h;
        this.vy=this.boosted>0?JUMP*1.4:JUMP;
        if(this.runFrames>=25){ this.vx=this.runDir*(spd+1.8); this.vy*=1.1; }
        this.squish=8; p.bounce=1.15;
        if(p===this.lastLandedPlat){ combo=0; comboTimer=0; } else { combo++; comboTimer=90; }
        this.lastLandedPlat=p;
        spawnP(this.cx,this.bottom,4,[THEMES[theme].plat[p.ci%THEMES[theme].plat.length]||GOLD]);
        if(p.hasPow&&!p.powOk){ p.powOk=true; this.applyPow(p.powT); }
        // Challenge resolution
        if(p.type==='ch_correct'){ activePrompt=null; this.springJump(); }
        if(p.type==='ch_wrong'){
          activePrompt=null;
          if(this.shielded>0){ this.shielded=0; spawnP(this.cx,this.bottom,12,['#a29bfe','#fff','#c8b0ff']); }
          else{ p.crumble=1; this.applyDebuff(); }
        }
        // Checkpoint
        if(p.type==='checkpoint' && !p.cpUsed){
          p.cpUsed = true;
          checkpointCount++; cpStreak++;
          theme = checkpointCount % THEMES.length;
          hazardSpeed = HAZARD_START_SPEED*Math.pow(HAZARD_MULT,checkpointCount);
          hazardPause = PAUSE_FRAMES;
          themeFlash = 28;
          spawnP(this.cx,this.bottom,35,[GOLD,'#fff','#ffd166']);
          const newPrestige = Math.floor(checkpointCount / THEMES.length);
          if(newPrestige > prestige){
            prestige = newPrestige;
            ngBannerTimer = 220;
          }
        }
        if(p.y<this.lastPlatY){
          const ns=Math.round(Math.abs(p.y)/40);
          if(ns>this.score) scorePops.push({x:this.cx,sy:this.y-camY-18,val:'+'+(ns-this.score)+'m',life:1});
          this.score=ns; this.lastPlatY=p.y;
        }
        break;
      }
    }
  }
  draw(cam){
    const dy=this.y-cam, cx=this.cx;
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i];
      ctx.globalAlpha=(i/this.trail.length)*0.18;
      ctx.fillStyle=skinColor; ctx.beginPath();
      ctx.ellipse(t.x,t.y-cam,7,9,0,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    if(this.shielded>0){
      ctx.save(); ctx.strokeStyle='#a29bfe'; ctx.lineWidth=3;
      ctx.globalAlpha=0.5+Math.sin(frameCount*0.2)*0.3;
      ctx.beginPath(); ctx.ellipse(cx,dy+this.h/2,22,26,0,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }
    if(this.debuff>0){
      ctx.save(); ctx.globalAlpha=0.35; ctx.fillStyle='#6b3a2a';
      ctx.beginPath(); ctx.ellipse(cx,dy+this.h,18,9,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.save();
    ctx.translate(cx,dy+this.h); ctx.scale(this.dir,1);
    ctx.fillStyle=skinColor+'55'; ctx.beginPath();
    ctx.ellipse(0,0,10,4,0,0,Math.PI*2); ctx.fill();
    const sy2=this.squish>0?1.3-(this.squish/8)*0.3:1;
    ctx.scale(1,1/sy2); ctx.translate(0,-this.h);
    ctx.fillStyle='#3a2510'; ctx.beginPath(); ctx.roundRect(-12,16,24,16,4); ctx.fill();
    ctx.scale(1,sy2);
    ctx.fillStyle=skinColor; ctx.beginPath(); ctx.roundRect(-11,0,22,22,[8,8,2,2]); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath();
    ctx.ellipse(-4,9,4,4.5,0,0,Math.PI*2); ctx.ellipse(4,9,4,4.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1a1a2e'; ctx.beginPath();
    ctx.ellipse(-3.5,9.5,2.5,2.5,0,0,Math.PI*2); ctx.ellipse(4.5,9.5,2.5,2.5,0,0,Math.PI*2); ctx.fill();
    if(this.speedy>0){ ctx.fillStyle='#ffd166'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center'; ctx.fillText('⚡',0,-4); }
    ctx.restore();
    ctx.fillStyle=GOLD; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
    ctx.fillText(PLAYER_NAME.length>10?PLAYER_INITIALS:PLAYER_NAME, cx, dy-6);
  }
}

// ── Particles ─────────────────────────────────────────────────────────────────
class Particle {
  constructor(x,y,c){ this.x=x;this.y=y;this.vx=rf(-3,3);this.vy=rf(-4,-1);this.c=c;this.life=1;this.r=rf(3,7); }
  update(){ this.x+=this.vx;this.y+=this.vy;this.vy+=0.15;this.life-=0.04; }
  draw(cam){ ctx.globalAlpha=this.life;ctx.fillStyle=this.c;ctx.beginPath();ctx.arc(this.x,this.y-cam,this.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1; }
}
function spawnP(x,y,n,cols){ for(let i=0;i<n;i++) particles.push(new Particle(x,y,cols[ri(0,cols.length)])); }

// ── Platform generation ───────────────────────────────────────────────────────
function generatePlatforms(fromY,toY){
  let y=fromY;
  while(y>toY){
    const gap=Math.min(190,75+Math.abs(fromY)/500);
    y-=rf(60,gap);
    platSpawnCount++;
    const hm=Math.round(Math.abs(y)/40); // current height in metres
    if(hm>=nextCheckpoint){
      platforms.push(new Platform(0,y,W,0,'checkpoint'));
      nextCheckpoint+=CHECKPOINT_EVERY;
      y -= 130; // skip-safe: momentum max reach from 60 below = 118 units < 130; reachable from checkpoint (147 normal)
      continue;
    }
    if(hm>=nextChallenge){
      const gens = prestige===0 ? GENS_NORMAL : prestige===1 ? [...GENS_NORMAL,...GENS_HARD] : GENS_HARD;
      const pr=gens[ri(0,gens.length)]();
      const cLeft=Math.random()<0.5;
      const pw=85, g2=20, tot=pw*2+g2, lx=W/2-tot/2;
      platforms.push(new Platform(lx,     y,pw,0, cLeft?'ch_correct':'ch_wrong',  String(cLeft?pr.correct:pr.decoy)));
      platforms.push(new Platform(lx+pw+g2,y,pw,0,!cLeft?'ch_correct':'ch_wrong', String(!cLeft?pr.correct:pr.decoy)));
      activePrompt=pr;
      nextChallenge+=CHECKPOINT_EVERY+ri(-CHALLENGE_JITTER,CHALLENGE_JITTER);
      continue;
    }
    const t=Math.random()<0.15?'moving':'normal';
    const w=Math.max(48,88-Math.abs(y)/350);
    platforms.push(new Platform(rf(0,W-w),y,w,null,t));
  }
}

// ── Skin helpers ──────────────────────────────────────────────────────────────
function colorFromT(t){
  t=Math.max(0,Math.min(1,t));
  let s0=SKIN_STOPS[0],s1=SKIN_STOPS[1];
  for(let i=0;i<SKIN_STOPS.length-1;i++){
    if(t>=SKIN_STOPS[i][0]&&t<=SKIN_STOPS[i+1][0]){s0=SKIN_STOPS[i];s1=SKIN_STOPS[i+1];break;}
  }
  const r=(s1[0]-s0[0])>0?(t-s0[0])/(s1[0]-s0[0]):0;
  const lerp=(a,b,x)=>Math.round(a+(b-a)*x);
  return '#'+[0,1,2].map(i=>lerp(s0[1][i],s1[1][i],r).toString(16).padStart(2,'0')).join('');
}
function tFromX(x){ return Math.max(0,Math.min(1,(x-SGBX)/SGW)); }
function thumbX(){ return SGBX + skinToneT * SGW; }
function specThumbX(){ return SGBX + specT * SGW; }

// ── Draw helpers ──────────────────────────────────────────────────────────────
function drawBg(){
  const th=THEMES[theme];
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,th.bgTop); g.addColorStop(1,th.bgBot);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.4)';
  for(let i=0;i<40;i++){
    const sx=(i*137+frameCount*0.1)%W;
    const sy=(i*97+(camY%H)*0.3+frameCount*0.04*(i%3))%H;
    ctx.beginPath(); ctx.arc(sx,sy,i%3===0?1.4:0.6,0,Math.PI*2); ctx.fill();
  }
}

function drawHazard(){
  const th=THEMES[theme];
  const sy=hazardY-camY;
  if(sy>H) return;
  ctx.beginPath(); ctx.moveTo(0,sy);
  for(let x=0;x<=W;x+=8){
    const wAmp=8+prestige*5, wAmp2=5+prestige*3;
    const w=Math.sin(x*0.04+frameCount*0.1)*wAmp+Math.cos(x*0.07+frameCount*0.07)*wAmp2;
    ctx.lineTo(x,sy+w);
  }
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
  const g=ctx.createLinearGradient(0,sy,0,H);
  g.addColorStop(0,th.hazTop); g.addColorStop(1,th.hazBot);
  ctx.fillStyle=g; ctx.fill();
  if(sy>10&&sy<H-20){
    ctx.fillStyle='#fff'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
    ctx.globalAlpha=0.7+Math.sin(frameCount*0.1)*0.3;
    ctx.fillText(th.hazLabel,W/2,sy+18); ctx.globalAlpha=1;
  }
  if(hazardPause>0){
    ctx.fillStyle=GOLD; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
    ctx.fillText('⏸ HAZARD PAUSED',W/2,Math.min(sy+36,H-10));
  }
}

function drawChallengeFlash(){
  if(!activePrompt) return;
  const pair=platforms.filter(p=>p.type==='ch_correct'||p.type==='ch_wrong');
  if(!pair.length){ activePrompt=null; return; }
  const cp=pair[0];
  const platSY=cp.y-camY;
  if(platSY>H+20||platSY<-60) return;
  // Float question bubble above the two platforms
  const p2=pair[1];
  const midX=p2?(cp.x+cp.w/2+p2.x+p2.w/2)/2:cp.x+cp.w/2;
  const qy=Math.max(platSY-44, 28);
  ctx.save();
  ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,0.82)';
  ctx.beginPath(); ctx.roundRect(midX-100,qy-22,200,44,10); ctx.fill();
  ctx.strokeStyle=GOLD; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(midX-100,qy-22,200,44,10); ctx.stroke();
  ctx.fillStyle=GOLD; ctx.font='bold 9px sans-serif';
  ctx.fillText('⚡ CHALLENGE',midX,qy-8);
  ctx.fillStyle='#fff'; ctx.font='bold 20px sans-serif';
  ctx.fillText(activePrompt.q,midX,qy+13);
  ctx.restore();
}

function drawPrestigeOverlay(){
  if(prestige<1) return;
  const slAlpha=Math.min(0.18,0.06*prestige);
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,'+slAlpha+')';
  for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,2);
  ctx.restore();
  if(prestige<2) return;
  const shift=Math.min(5,prestige);
  const pulse=0.14+Math.sin(frameCount*0.06)*0.06;
  ctx.save(); ctx.globalAlpha=pulse;
  const gr=ctx.createLinearGradient(0,0,shift*4,0);
  gr.addColorStop(0,'rgba(255,0,60,0.9)'); gr.addColorStop(1,'rgba(255,0,60,0)');
  ctx.fillStyle=gr; ctx.fillRect(0,0,shift*4,H);
  const gb=ctx.createLinearGradient(W,0,W-shift*4,0);
  gb.addColorStop(0,'rgba(0,120,255,0.9)'); gb.addColorStop(1,'rgba(0,120,255,0)');
  ctx.fillStyle=gb; ctx.fillRect(W-shift*4,0,shift*4,H);
  ctx.restore();
}

function drawHazardWarning(){
  const dist=hazardY-player.bottom;
  if(dist>110||hazardPause>0) return;
  const a=(1-dist/110)*0.32*(0.7+Math.sin(frameCount*0.35)*0.3);
  ctx.save(); ctx.globalAlpha=a;
  const g=ctx.createLinearGradient(0,H,0,H-55);
  g.addColorStop(0,'rgba(255,40,40,0.9)'); g.addColorStop(1,'rgba(255,40,40,0)');
  ctx.fillStyle=g; ctx.fillRect(0,H-55,W,55);
  ctx.restore();
}

function drawPowerUpHUD(){
  const pups=[];
  if(player.speedy>0)   pups.push({e:'⚡',c:'#ffd166',t:player.speedy,  max:120});
  if(player.boosted>0)  pups.push({e:'↑', c:'#00cec9',t:player.boosted, max:60});
  if(player.shielded>0) pups.push({e:'🛡',c:'#a29bfe',t:player.shielded,max:180});
  if(!pups.length) return;
  const r=16, y=H-30;
  const sx=W/2-(pups.length-1)*42/2;
  pups.forEach((p,i)=>{
    const x=sx+i*42, prog=Math.max(0,p.t/p.max);
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.65)';
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=p.c+'44'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(x,y,r-1.5,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle=p.c; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(x,y,r-1.5,-Math.PI/2,-Math.PI/2+prog*Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1; ctx.font='13px sans-serif'; ctx.textAlign='center';
    ctx.fillText(p.e,x,y+5);
    ctx.restore();
  });
}

  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5; ctx.stroke();

  ctx.beginPath(); ctx.arc(tx2,sgby+SGH/2,15,0,Math.PI*2); ctx.fill(); ctx.stroke();

}

// ── Game loop ─────────────────────────────────────────────────────────────────
function gameLoop(){
  requestAnimationFrame(gameLoop);
  if(state==='skin')    { drawSkinPicker(); return; }
  frameCount++;
  if(state==='start')   { drawStart(); return; }
  if(state==='gameover'){ drawGameOver(); return; }

  if(!gamePaused){
    player.update();
    const target=player.y-H*0.45;
    camY+=(target-camY)*0.08;

    if(player.y<topReached-30){ generatePlatforms(topReached-30,topReached-2200); topReached-=2200; }

    platforms=platforms.filter(p=>!p.dead&&p.y-camY<H+100);
    platforms.forEach(p=>p.update());
    particles=particles.filter(p=>p.life>0);
    particles.forEach(p=>p.update());

    if(hazardPause>0) hazardPause--;
    else              hazardY-=hazardSpeed;
  }

  drawBg();
  if(themeFlash>0){
    ctx.save(); ctx.globalAlpha=(themeFlash/28)*0.55;
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
    ctx.restore(); themeFlash--;
  }
  drawHazard();
  platforms.forEach(p=>p.draw(camY));
  particles.forEach(p=>p.draw(camY));
  player.draw(camY);
  // Score pops
  scorePops=scorePops.filter(p=>p.life>0);
  scorePops.forEach(p=>{
    p.sy-=1.2; p.life-=0.025;
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.fillStyle=p.c??GOLD; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
    ctx.fillText(p.val,p.x,p.sy);
    ctx.restore();
  });
  drawTouchZones();
  drawHazardWarning();
  drawPrestigeOverlay();
  drawChallengeFlash();
  drawPowerUpHUD();
  drawHUD();

  if(gamePaused){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#fff'; ctx.font='bold 28px sans-serif'; ctx.fillText('⏸ PAUSED',W/2,H/2);
    ctx.fillStyle='#888'; ctx.font='13px sans-serif'; ctx.fillText('Tap score panel to resume',W/2,H/2+28);
    ctx.restore();
    return;
  }

  if(player.bottom>hazardY||player.y-camY>H+80){
    state='gameover';
    if(!scoreSubmitted){ scoreSubmitted=true; submitScore(player.score); }
  }
}

// ── Input ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(state==='start')   { state='playing'; initGame(); }
  if(state==='gameover'&&e.key==='Enter'){ state='playing'; initGame(); }
});
document.addEventListener('keyup',e=>{ keys[e.key]=false; });

C.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const rect=C.getBoundingClientRect();
  const cx=(e.clientX-rect.left)*(W/rect.width);
  const cy=(e.clientY-rect.top)*(H/rect.height);
  const sgby=H/2+SGBY_OFF;
  const specby=H/2+SPEC_Y_OFF;
  if(state==='skin'){
    if(cy>=sgby-12&&cy<=sgby+SGH+12){
      skinDragging=true; skinToneT=tFromX(cx); skinColor=colorFromT(skinToneT); return;
    }
    if(cy>=specby-10&&cy<=specby+SPEC_H+10){
      specDragging=true; specT=Math.max(0,Math.min(1,(cx-SGBX)/SGW));
      skinColor=hslToHex(specT*360,90,55); return;
    }
    if(cy>specby+SPEC_H+96&&cy<specby+SPEC_H+148&&cx>W/2-80&&cx<W/2+80){ state='start'; return; }
    return;
  }
  if(state==='start'){ state='playing'; initGame(); return; }
  if(state==='gameover'){
    if(cy>H/2+145&&cy<H/2+192&&cx>W/2-72&&cx<W/2+72){ shareScore(); return; }
    if(cy>H/2+85&&cy<H/2+145&&cx>W*0.22&&cx<W*0.78){ state='playing'; initGame(); }
    return;
  }
  if(state==='playing'&&cx>=8&&cx<=148&&cy>=8&&cy<=60){ gamePaused=!gamePaused; return; }
  if(cx<W*0.45) touched.left =true;
  if(cx>W*0.55) touched.right=true;
},{passive:false});

C.addEventListener('pointermove',e=>{
  const rect=C.getBoundingClientRect();
  const cx=(e.clientX-rect.left)*(W/rect.width);
  const cy=(e.clientY-rect.top)*(H/rect.height);
  if(skinDragging){ skinToneT=tFromX(cx); skinColor=colorFromT(skinToneT); return; }
  if(specDragging){ specT=Math.max(0,Math.min(1,(cx-SGBX)/SGW)); skinColor=hslToHex(specT*360,90,55); return; }
  if(!touched.left&&!touched.right) return;
  touched.left=cx<W*0.45; touched.right=cx>W*0.55;
});
C.addEventListener('pointerup',()=>{ skinDragging=false; specDragging=false; touched.left=false; touched.right=false; });

gameLoop();
</script>
</body>
